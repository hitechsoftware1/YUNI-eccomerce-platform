<svg width="512" height="512" viewBox="0 0 512 512"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff2f92"/>
      <stop offset="100%" stop-color="#ff006e"/>
    </linearGradient>

    <linearGradient id="rightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b2cff"/>
      <stop offset="100%" stop-color="#3a1fbf"/>
    </linearGradient>

    <linearGradient id="swooshGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb000"/>
      <stop offset="100%" stop-color="#ff7a00"/>
    </linearGradient>
  </defs>

  <!-- App Icon Background -->
  <rect x="36" y="36" width="440" height="440" rx="90" fill="#0f0b1f"/>

  <!-- Shopping Bag Left -->
  <rect x="130" y="160" width="120" height="200" rx="24"
        fill="url(#leftGrad)"/>

  <!-- Shopping Bag Right -->
  <rect x="250" y="160" width="120" height="200" rx="24"
        fill="url(#rightGrad)"/>

  <!-- Handle -->
  <path d="M170 160 C170 110, 350 110, 350 160"
        stroke="#1d124d" stroke-width="14" fill="none"/>

  <!-- Orange Swoosh -->
  <path d="M135 285 C200 245, 310 245, 375 265"
        stroke="url(#swooshGrad)" stroke-width="26"
        fill="none" stroke-linecap="round"/>

  <!-- Cart -->
  <path d="M280 195 h52 l-8 32 h-36 z" fill="#ffffff"/>
  <circle cx="288" cy="235" r="6" fill="#ffffff"/>
  <circle cx="318" cy="235" r="6" fill="#ffffff"/>

  <!-- Checkmark -->
  <path d="M300 180 l8 8 l16 -16"
        stroke="#ffffff" stroke-width="6"
        fill="none" stroke-linecap="round"/>

</svg>
